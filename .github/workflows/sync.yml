name: Save release albums to YouTube Music

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Write browser.json
        run: echo "${{ secrets.YTMUSIC_BROWSER_B64 }}" | base64 -d > browser.json

      - name: Run sync
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_QUERY: label:album-release is:unread
          YTMUSIC_AUTH_FILE: browser.json
          MIN_MATCH_SCORE: "5"
          MAX_EMAILS_PER_RUN: "50"
        run: python sync_albums.py